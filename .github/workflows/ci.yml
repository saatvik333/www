name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt all JS-based actions into Node 24 (Node 20 deprecated, removed Sept 16 2026).
# Allows us to keep using actions/checkout@v4, actions/cache@v4, etc. without forced upgrades.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
        run: |
          if [ "$IS_PR" = "true" ] && [ "$PR_AUTHOR" != "dependabot[bot]" ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi
      - run: bun run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
        run: |
          if [ "$IS_PR" = "true" ] && [ "$PR_AUTHOR" != "dependabot[bot]" ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi
      - run: bunx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
        run: |
          if [ "$IS_PR" = "true" ] && [ "$PR_AUTHOR" != "dependabot[bot]" ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi
      - run: bun run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
        run: |
          if [ "$IS_PR" = "true" ] && [ "$PR_AUTHOR" != "dependabot[bot]" ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          # Invalidate cache when deps or any source/content file changes
          key: ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx', 'content/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-
      - run: bun run build
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
